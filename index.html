        <b> 沁园春·长沙</b><br> 
        <a><i>毛泽东</i></a> (近现代) <br>
        <hr/ size="4px" color="blue" width="60%">
        <p align="center">
        独立寒秋，湘江北去，橘子洲头。<br>
        看万山红遍，层林尽染；漫江碧透，百舸争流。<br>
        鹰击长空，鱼翔浅底，万类霜天竞自由。<br>
        怅寥廓，问苍茫大地，谁主沉浮？<br>
        <br>
        携来百侣曾游。忆往昔峥嵘岁月稠。<br>
        恰同学少年，风华正茂；书生意气，挥斥方遒。<br>
        指点江山，激扬文字，粪土当年万户侯。<br>
        曾记否，到中流击水，浪遏飞舟？<br>
        </p>
